                    {

                    {

                        icon: "fa-bag-shopping",
                        tag: "購物",
                        link: "https://mitsui-shopping-park.com/lalaport/fukuoka/tw/",
                        linkText: "LaLaport 樓層指南",

                        imgType: "attraction",
                        location: "福岡市博多区那珂6-23-1",
                        googleMap: "LaLaport+Fukuoka",
                        transport: { text: "步行前往 (商場內)", icon: "fa-person-walking" }
                    },
                    { 
                        time: "16:30", 
                        title: "前往福岡機場 & 領取行李", 
                        desc: "搭乘計程車直達國際線航廈。在 1F 入境大廳 (Cargo Pass/宅配櫃台) 領取行李。<br>🛍️ 免稅店必買：<br>1. YAMAYA 軟管明太子醬 (需冷藏 12hr)。<br>2. 一蘭拉麵博多細麵 (直條麵) (福岡限定版/盒裝)。",  
                        icon: "fa-suitcase-rolling",
                        tag: "重要",
                        image: "img/48998695593_5e008f2474_c.jpg",
                        imgType: "attraction",
                        transport: { text: "計程車 (LaLaport -> 福岡機場國際線, 約 15-20 分)", icon: "fa-taxi" }
                    },
                    { time: "19:20", title: "搭機返台", desc: "帶著滿滿的回憶回家", icon: "fa-plane-departure" }
                ]
            }
        ];

        // Init Exchange Rate
        document.getElementById('exchange-rate').innerHTML = `1 TWD ≈ ${EXCHANGE_RATE} JPY <i class="fa-solid fa-arrows-rotate ml-1 text-xs cursor-pointer" onclick="alert('匯率已更新')"></i>`;

        // Render Tabs
        const tabContainer = document.getElementById('day-tabs');
        const contentContainer = document.getElementById('itinerary-container');

        itinerary.forEach((day, index) => {
            const btn = document.createElement('button');
            btn.className = `day-tab whitespace-nowrap px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-600 font-medium transition-colors duration-200 hover:bg-gray-50 focus:outline-none flex-shrink-0 ${index === 0 ? 'active' : ''}`;
            btn.textContent = day.date;
            btn.onclick = () => switchTab(index);
            tabContainer.appendChild(btn);
        });

        // Function to Switch Tabs and Render Content
        function switchTab(index, isInitialLoad = false) {
            try {
                // Update Tab Styles
                const tabs = document.querySelectorAll('.day-tab'); 
                tabs.forEach((t, i) => {
                    if(i === index) {
                        t.classList.add('active');
                    } else {
                        t.classList.remove('active');
                    }
                });

                // Render Content
                const day = itinerary[index];
                if (!day) return;

                let html = `
                    <div class="glass-card rounded-3xl shadow-glass p-6 sm:p-8 animate-fade-in relative overflow-hidden mt-4">
                        <div class="absolute -right-20 -top-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl"></div>
                        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 relative z-10 gap-4 border-b border-gray-100 pb-6">
                            <div>
                                <h2 class="text-3xl font-extrabold text-gray-800 tracking-tight">${day.title}</h2>
                                <p class="text-sm text-primary font-bold mt-1.5 px-3 py-1 bg-primary/5 inline-block rounded-md border border-primary/10">${day.memo}</p>
                            </div>
                            <div class="flex items-center text-indigo-700 bg-indigo-50 border border-indigo-100 px-4 py-2 rounded-full text-sm shadow-sm font-bold whitespace-nowrap group hover:bg-indigo-100 transition-colors">
                                <i class="fa-solid fa-cloud-sun mr-2.5 text-indigo-500 scale-110 group-hover:rotate-12 transition-transform"></i>
                                ${day.weather}
                            </div>
                        </div>
                        <div class="space-y-8 relative before:absolute before:inset-0 before:ml-[1.4rem] before:-translate-x-px before:h-[98%] before:w-1 before:bg-gradient-to-b before:from-primary/30 before:via-secondary/20 before:to-transparent before:rounded-full pt-2">
                `;

                day.events.forEach(event => {
                    let tagHtml = '';
                    if (event.tag) {
                        tagHtml = `<span class="inline-block bg-gradient-to-r from-pink-50 to-rose-50 text-pink-600 text-xs font-bold px-3 py-1.5 rounded-full border border-pink-200 shadow-sm">${event.tag}</span>`;
                    }

                    // Pre-calculate conditional HTML blocks to avoid nested template literal confusion
                    const transportHtml = event.transport ? `
                        <div class="flex items-center text-slate-500 text-sm bg-slate-50/80 backdrop-blur-sm p-3 rounded-xl mb-3 border border-slate-100/50 hover:bg-slate-100 transition-colors group">
                            <div class="w-8 h-8 rounded-lg bg-white shadow-soft flex items-center justify-center mr-3 text-slate-400 group-hover:text-primary transition-colors">
                                <i class="fa-solid ${event.transport.icon}"></i>
                            </div>
                            <span class="font-medium">${event.transport.text}</span>
                        </div>
                    ` : '';

                    const bookingHtml = event.booking ? `
                        <div class="flex items-start text-amber-700 text-sm bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 p-3 rounded-xl mb-3 shadow-sm">
                            <i class="fa-solid fa-calendar-check mt-0.5 w-6 text-center text-amber-500 mr-2"></i>
                            <span class="font-bold tracking-wide">⚠️ ${typeof event.booking === 'string' ? event.booking : '需提前預約'}</span>
                        </div>
                    ` : '';

                    const rainHtml = event.rain ? `
                        <div class="flex items-start text-blue-700 text-sm bg-blue-50 border border-blue-200 p-3 rounded-xl mb-3 shadow-sm">
                            <i class="fa-solid fa-umbrella mt-0.5 w-6 text-center text-blue-400 mr-2"></i>
                            <span class="font-bold tracking-wide">${event.rain}</span>
                        </div>
                    ` : '';

                    const nonShopperHtml = event.nonShopper ? `
                        <div class="flex items-start text-teal-700 text-sm bg-teal-50 border border-teal-200 p-3 rounded-xl mb-3 shadow-sm">
                            <i class="fa-solid fa-mug-hot mt-0.5 w-6 text-center text-teal-500 mr-2"></i>
                            <span class="font-bold tracking-wide">${event.nonShopper}</span>
                        </div>
                    ` : '';

                    const priceHtml = event.price ? `
                        <div class="inline-flex items-center text-xs font-bold text-gray-700 bg-white border border-gray-100 shadow-sm px-3 py-1.5 rounded-lg mr-2 mb-2 transition-transform hover:scale-105">
                            <i class="fa-solid fa-yen-sign mr-1.5 text-gray-400"></i>
                            平均：${event.price}
                        </div>
                    ` : '';

                    const menuHtml = event.menuLink ? `
                        <a href="${event.menuLink}" target="_blank" class="inline-flex items-center text-xs font-bold text-orange-600 bg-orange-50 px-3 py-1.5 rounded-lg border border-orange-200 hover:bg-orange-100 hover:-translate-y-0.5 transition-all mb-2 shadow-sm">
                            <i class="fa-solid fa-book-open mr-1.5"></i>
                            查看菜單
                        </a>
                    ` : '';

                    const linkHtml = event.link ? `
                        <div class="mb-4 mt-2">
                            <a href="${event.link}" target="_blank" class="inline-flex items-center justify-center text-sm font-bold text-white bg-indigo-500 hover:bg-indigo-600 px-4 py-2.5 rounded-xl transition-all w-full sm:w-auto shadow-sm hover:shadow-md hover:-translate-y-0.5">
                                <i class="fa-solid fa-book-open mr-2"></i>
                                ${event.linkText || '查看詳細資訊'} <i class="fa-solid fa-arrow-up-right-from-square ml-1.5 text-xs opacity-80"></i>
                            </a>
                        </div>
                    ` : '';

                    const imageHtml = event.image ? `
                        <div class="mt-4 rounded-xl overflow-hidden relative group cursor-pointer shadow-soft border border-gray-100" onclick="openLightbox('${event.image}')">
                            <img src="${event.image}" alt="${event.title}" class="w-full h-56 object-cover transition-transform duration-700 group-hover:scale-105">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/0 to-transparent transition-opacity duration-300 opacity-0 group-hover:opacity-100"></div>
                            <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                                <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center border border-white/40">
                                    <i class="fa-solid fa-expand text-white text-xl"></i>
                                </div>
                            </div>
                        </div>
                    ` : '';

                    const locationHtml = event.location ? `
                        <div class="mt-4 pt-3 border-t border-gray-100 flex flex-col sm:flex-row justify-between items-start sm:items-center bg-gray-50/50 -mx-3 sm:-mx-5 -mb-5 px-3 sm:px-5 py-3 rounded-b-2xl gap-2 sm:gap-0">
                            <span class="text-xs text-gray-500 font-medium truncate w-full sm:w-[70%]"><i class="fa-solid fa-map-pin mr-1.5 text-gray-400"></i>${event.location}</span>
                            <a href="https://www.google.com/maps/search/?api=1&query=${event.googleMap || event.location}" target="_blank" class="map-link text-xs font-bold text-primary flex items-center bg-white px-3 py-1.5 sm:px-2.5 sm:py-1 rounded-md shadow-sm border border-indigo-50 hover:bg-indigo-50 w-full justify-center sm:w-auto sm:justify-start">
                                導航 <i class="fa-solid fa-location-arrow ml-1.5 text-[10px]"></i>
                            </a>
                        </div>
                    ` : '';

                    html += `
                        <div class="relative pl-10 sm:pl-12 pr-1 sm:pr-2 group">
                            <div class="absolute left-0 top-1 w-[2.4rem] h-[2.4rem] sm:w-[2.8rem] sm:h-[2.8rem] bg-white border-4 border-indigo-50 rounded-full flex items-center justify-center shadow-soft z-10 text-primary transition-all duration-300 group-hover:scale-110 group-hover:border-indigo-100 group-hover:text-indigo-600">
                                <i class="fa-solid ${event.icon || 'fa-location-dot'} text-base sm:text-lg"></i>
                            </div>
                            <div class="glass-card event-card p-4 sm:p-5 rounded-2xl relative z-0 ml-1 sm:ml-2 shadow-soft hover:shadow-lg w-full break-words">
                                <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start mb-3 gap-2 sm:gap-0">
                                    <span class="font-black text-transparent bg-clip-text bg-gradient-to-br from-primary to-indigo-400 font-mono text-xl tracking-tighter">${event.time}</span>
                                    <div class="sm:ml-2">${tagHtml}</div>
                                </div>
                                <h3 class="font-extrabold text-gray-800 text-lg sm:text-xl mb-2 tracking-tight leading-snug break-words hyphens-auto">${event.title}</h3>
                                <div class="mb-3 flex flex-wrap gap-2">
                                    ${priceHtml}
                                    ${menuHtml}
                                </div>
                                <p class="text-gray-600 text-sm sm:text-[15px] mb-4 leading-relaxed font-medium break-words">${event.desc}</p>
                                
                                <div class="space-y-1">
                                    ${transportHtml}
                                    ${rainHtml}
                                    ${nonShopperHtml}
                                    ${bookingHtml}
                                </div>
                                ${linkHtml}
                                ${imageHtml}
                                ${locationHtml}
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
                contentContainer.innerHTML = html;

                // Scroll to top of the itinerary container smoothly
                if (!isInitialLoad) {
                    // Set a small timeout to allow DOM to render to get accurate positioning
                    setTimeout(() => {
                        const tabsHeight = tabContainer.offsetHeight;
                        const offsetPosition = contentContainer.offsetTop - tabsHeight - 10;

                        window.scrollTo({
                             top: Math.max(0, offsetPosition),
                             behavior: "smooth"
                        });
                    }, 10);
                }

            } catch (e) {
                console.error("Error rendering itinerary:", e);
                contentContainer.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert"><strong class="font-bold">發生錯誤!</strong><span class="block sm:inline"> 無法顯示行程內容: ${e.message}</span></div>`;
            }
        }

        // Initial Render
        switchTab(0, true);

        // Lightbox Functions
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.style.display = 'flex';
            // Trigger reflow
            void lightbox.offsetWidth;
            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show');
            document.body.style.overflow = ''; // Restore scrolling
            setTimeout(() => {
                lightbox.style.display = 'none';
                document.getElementById('lightbox-img').src = '';
            }, 300);
        }

        // Fetch Weather Data
        async function fetchWeather() {
            try {
                // Fukuoka Coordinates
                const lat = 33.5902;
                const lon = 130.4017;
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code&timezone=Asia%2FTokyo`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error('Weather network response was not ok');
                
                const data = await response.json();
                const current = data.current;
                
                // Update UI
                document.getElementById('weather-temp').innerText = `${Math.round(current.temperature_2m)}°`;
                document.getElementById('weather-humidity').innerText = `${Math.round(current.relative_humidity_2m)}%`;
                document.getElementById('weather-wind').innerText = `${Math.round(current.wind_speed_10m)} km/h`;
                
                // Map WMO Weather Codes to FontAwesome Icons and Colors
                // WMO Code Ref: https://open-meteo.com/en/docs
                const code = current.weather_code;
                const iconMap = {
                    0: { icon: 'fa-sun', iconColor: 'text-yellow-500', bg: 'from-yellow-100 to-yellow-50' }, // Clear
                    1: { icon: 'fa-cloud-sun', iconColor: 'text-yellow-500', bg: 'from-yellow-100 to-yellow-50' }, // Mainly clear
                    2: { icon: 'fa-cloud-sun', iconColor: 'text-gray-500', bg: 'from-gray-100 to-gray-50' }, // Partly cloudy
                    3: { icon: 'fa-cloud', iconColor: 'text-gray-500', bg: 'from-gray-200 to-gray-100' }, // Overcast
                    45: { icon: 'fa-smog', iconColor: 'text-gray-400', bg: 'from-gray-200 to-gray-100' }, // Fog
                    48: { icon: 'fa-smog', iconColor: 'text-gray-400', bg: 'from-gray-200 to-gray-100' },
                    51: { icon: 'fa-cloud-rain', iconColor: 'text-blue-500', bg: 'from-blue-100 to-blue-50' }, // Drizzle
                    53: { icon: 'fa-cloud-rain', iconColor: 'text-blue-500', bg: 'from-blue-100 to-blue-50' },
                    55: { icon: 'fa-cloud-rain', iconColor: 'text-blue-500', bg: 'from-blue-100 to-blue-50' },
                    61: { icon: 'fa-cloud-showers-heavy', iconColor: 'text-blue-600', bg: 'from-blue-200 to-blue-100' }, // Rain
                    63: { icon: 'fa-cloud-showers-heavy', iconColor: 'text-blue-600', bg: 'from-blue-200 to-blue-100' },
                    65: { icon: 'fa-cloud-showers-heavy', iconColor: 'text-blue-600', bg: 'from-blue-200 to-blue-100' },
                    71: { icon: 'fa-snowflake', iconColor: 'text-cyan-500', bg: 'from-cyan-100 to-cyan-50' }, // Snow
                    73: { icon: 'fa-snowflake', iconColor: 'text-cyan-500', bg: 'from-cyan-100 to-cyan-50' },
                    75: { icon: 'fa-snowflake', iconColor: 'text-cyan-500', bg: 'from-cyan-100 to-cyan-50' },
                    80: { icon: 'fa-cloud-showers-water', iconColor: 'text-blue-500', bg: 'from-blue-100 to-blue-50' }, // Showers
                    81: { icon: 'fa-cloud-showers-water', iconColor: 'text-blue-500', bg: 'from-blue-100 to-blue-50' },
                    82: { icon: 'fa-cloud-showers-water', iconColor: 'text-blue-500', bg: 'from-blue-100 to-blue-50' },
                    95: { icon: 'fa-cloud-bolt', iconColor: 'text-indigo-600', bg: 'from-indigo-200 to-indigo-100' }, // Thunderstorm
                    96: { icon: 'fa-cloud-bolt', iconColor: 'text-indigo-600', bg: 'from-indigo-200 to-indigo-100' },
                    99: { icon: 'fa-cloud-bolt', iconColor: 'text-indigo-600', bg: 'from-indigo-200 to-indigo-100' }
                };

                const weatherConfig = iconMap[code] || { icon: 'fa-cloud', iconColor: 'text-blue-500', bg: 'from-blue-100 to-blue-50' };
                
                const iconContainer = document.getElementById('weather-icon-container');
                iconContainer.className = `w-12 h-12 rounded-full bg-gradient-to-br ${weatherConfig.bg} flex items-center justify-center shadow-soft ${weatherConfig.iconColor} text-2xl transition-colors duration-500`;
                
                // Use innerHTML because FontAwesome SVG core replaces the <i> tag natively
                iconContainer.innerHTML = `<i id="weather-icon" class="fa-solid ${weatherConfig.icon} animate-fade-in"></i>`;
                
            } catch (error) {
                console.error('Error fetching weather:', error);
                document.getElementById('weather-temp').innerText = 'N/A';
                
                const iconContainer = document.getElementById('weather-icon-container');
                if (iconContainer) {
                    iconContainer.innerHTML = `<i id="weather-icon" class="fa-solid fa-circle-exclamation text-red-500 animate-fade-in"></i>`;
                }
            }
        }

        // Initialize weather fetching after DOM is fully loaded
        document.addEventListener('DOMContentLoaded', () => {
            fetchWeather();
        });

    </script>
