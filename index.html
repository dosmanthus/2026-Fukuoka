                                <p class="text-sm text-gray-500">${day.memo}</p>
                            </div>
                            <div class="flex items-center text-gray-600 bg-gray-100 px-3 py-1 rounded-full text-sm">
                                <i class="fa-solid fa-cloud-sun mr-2"></i>
                                ${day.weather}
                            </div>
                        </div>
                        <div class="space-y-8 relative before:absolute before:inset-0 before:ml-5 before:-translate-x-px md:before:mx-auto md:before:translate-x-0 before:h-full before:w-0.5 before:bg-gradient-to-b before:from-transparent before:via-slate-300 before:to-transparent">
                `;

                day.events.forEach(event => {
                    let tagHtml = '';
                    if (event.tag) {
                        tagHtml = `<span class="inline-block bg-pink-100 text-pink-600 text-xs px-2 py-1 rounded-full mb-2 border border-pink-200">${event.tag}</span>`;
                    }

                    // Pre-calculate conditional HTML blocks to avoid nested template literal confusion
                    const transportHtml = event.transport ? `
                        <div class="flex items-center text-slate-500 text-sm bg-slate-100 p-2 rounded mb-3">
                            <i class="fa-solid ${event.transport.icon} w-5 text-center mr-2"></i>
                            <span>${event.transport.text}</span>
                        </div>
                    ` : '';

                    const bookingHtml = event.booking ? `
                        <div class="flex items-center text-amber-700 text-sm bg-amber-50 border border-amber-200 p-2 rounded mb-3">
                            <i class="fa-solid fa-calendar-check w-5 text-center mr-2"></i>
                            <span class="font-bold">⚠️ ${typeof event.booking === 'string' ? event.booking : '需提前預約'}</span>
                        </div>
                    ` : '';

                    const rainHtml = event.rain ? `
                        <div class="flex items-center text-blue-700 text-sm bg-blue-50 border border-blue-200 p-2 rounded mb-3">
                            <i class="fa-solid fa-umbrella w-5 text-center mr-2"></i>
                            <span class="font-bold">${event.rain}</span>
                        </div>
                    ` : '';

                    const nonShopperHtml = event.nonShopper ? `
                        <div class="flex items-center text-teal-700 text-sm bg-teal-50 border border-teal-200 p-2 rounded mb-3">
                            <i class="fa-solid fa-mug-hot w-5 text-center mr-2"></i>
                            <span class="font-bold">${event.nonShopper}</span>
                        </div>
                    ` : '';

                    const priceHtml = event.price ? `
                        <div class="inline-flex items-center text-xs font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded mr-2 mb-2">
                            <i class="fa-solid fa-yen-sign mr-1"></i>
                            平均：${event.price}
                        </div>
                    ` : '';

                    const menuHtml = event.menuLink ? `
                        <a href="${event.menuLink}" target="_blank" class="inline-flex items-center text-xs font-bold text-orange-600 bg-orange-50 px-2 py-1 rounded border border-orange-200 hover:bg-orange-100 transition-colors mb-2">
                            <i class="fa-solid fa-book-open mr-1"></i>
                            查看菜單
                        </a>
                    ` : '';

                    const linkHtml = event.link ? `
                        <div class="mb-3">
                            <a href="${event.link}" target="_blank" class="inline-flex items-center text-sm font-bold text-indigo-600 hover:text-indigo-800 bg-indigo-50 px-3 py-2 rounded-lg border border-indigo-200 transition-colors w-full sm:w-auto">
                                <i class="fa-solid fa-book-open mr-2"></i>
                                ${event.linkText || '查看詳細資訊'} <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-xs opacity-70"></i>
                            </a>
                        </div>
                    ` : '';

                    const imageHtml = event.image ? `
                        <div class="mt-3 rounded-lg overflow-hidden relative group cursor-pointer" onclick="openLightbox('${event.image}')">
                            <img src="${event.image}" alt="${event.title}" class="w-full h-48 object-cover transition-transform duration-500 group-hover:scale-105">
                            <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition-colors duration-300 flex items-center justify-center opacity-0 group-hover:opacity-100">
                                <i class="fa-solid fa-expand text-white text-3xl drop-shadow-md transform scale-75 group-hover:scale-100 transition-transform duration-300"></i>
                            </div>
                        </div>
                    ` : '';

                    const locationHtml = event.location ? `
                        <div class="mt-3 pt-2 border-t border-gray-200 flex justify-between items-center">
                            <span class="text-xs text-gray-400 truncate w-2/3"><i class="fa-solid fa-map-pin mr-1"></i>${event.location}</span>
                            <a href="https://www.google.com/maps/search/?api=1&query=${event.googleMap || event.location}" target="_blank" class="map-link text-xs font-bold text-blue-500 flex items-center">
                                導航 <i class="fa-solid fa-location-arrow ml-1"></i>
                            </a>
                        </div>
                    ` : '';

                    html += `
                        <div class="relative pl-10">
                            <div class="absolute left-0 top-1 w-10 h-10 bg-white border-2 border-blue-500 rounded-full flex items-center justify-center shadow-sm z-10 text-blue-500">
                                <i class="fa-solid ${event.icon || 'fa-location-dot'}"></i>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-100 hover:shadow-md transition-shadow">
                                <div class="flex justify-between items-start mb-2">
                                    <span class="font-bold text-blue-600 font-mono text-lg">${event.time}</span>
                                    ${tagHtml}
                                </div>
                                <h3 class="font-bold text-gray-800 text-lg mb-1">${event.title}</h3>
                                <div class="mb-2">
                                    ${priceHtml}
                                    ${menuHtml}
                                </div>
                                <p class="text-gray-600 text-sm mb-3 leading-relaxed">${event.desc}</p>
                                
                                ${transportHtml}
                                ${rainHtml}
                                ${nonShopperHtml}
                                ${linkHtml}
                                ${bookingHtml}
                                ${imageHtml}
                                ${locationHtml}
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
                contentContainer.innerHTML = html;
            } catch (e) {
                console.error("Error rendering itinerary:", e);
                contentContainer.innerHTML = `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert"><strong class="font-bold">發生錯誤!</strong><span class="block sm:inline"> 無法顯示行程內容: ${e.message}</span></div>`;
            }
        }

        // Initial Render
        switchTab(0);

        // Lightbox Functions
        function openLightbox(src) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.style.display = 'flex';
            // Trigger reflow
            void lightbox.offsetWidth;
            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden'; // Prevent scrolling
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show');
            document.body.style.overflow = ''; // Restore scrolling
            setTimeout(() => {
                lightbox.style.display = 'none';
                document.getElementById('lightbox-img').src = '';
            }, 300);
        }

    </script>
</body>
</html>
